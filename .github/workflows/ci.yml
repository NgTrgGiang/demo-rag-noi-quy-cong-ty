name: CI

# Chạy kiểm tra tự động mỗi khi push hoặc mở pull request vào main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cài Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cài thư viện
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint + format (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Chạy test (pytest)
        run: pytest -q
